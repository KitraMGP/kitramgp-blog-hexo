<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitra的遐想空间</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f7fa;
      color: #333;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
      height: 64px;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    }

    .topbar-title {
      font-size: 20px;
      font-weight: 600;
      color: #2c3e50;
    }

    .topbar-btn {
      display: inline-block;
      padding: 8px 24px;
      background: #409eff;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .topbar-btn:hover {
      background: #337ecc;
    }

    main {
      display: flex;
      justify-content: center;
      padding: 80px 20px;
    }

    .card {
      max-width: 640px;
      width: 100%;
      background: #fff;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
      line-height: 1.8;
      font-size: 16px;
    }

    .card p {
      margin-bottom: 16px;
    }

    .card a {
      color: #409eff;
      text-decoration: none;
    }

    .card a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <span class="topbar-title">Kitra的遐想空间</span>
    <a class="topbar-btn" href="https://blog.kitramgp.cn" target="_blank" rel="noopener">博客入口</a>
  </header>

  <main>
    <div class="card">
      <p>我是计算机科学与技术大三学生，软件开发爱好者。</p>
      <p>我是一名热爱技术与设计的 Web 开发工程师，专注于构建美观且易用的 Web 应用。此外，我还喜欢客户端开发和嵌入式开发。</p>
      <p>我闲暇时喜欢了解音乐制作相关的教程，梦想是做出 1k 星的开源项目，以及成为小有名气的作曲艺术家。</p>
      <p>欢迎通过邮箱 <a href="mailto:kitramgp@foxmail.com">kitramgp@foxmail.com</a> 与我交流！<br>
      此外，欢迎各位小伙伴和我扩列，QQ：3056894830。</p>
    </div>
  </main>
</body>
</html>
